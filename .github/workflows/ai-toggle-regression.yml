name: AI Toggle Regression

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run AI toggle regression suite
        run: |
          pytest \
            tests/test_ai_toggle_snapshot.py \
            tests/test_ai_toggle_api.py \
            tests/test_images.py \
            tests/test_phase10_rag_compliance.py \
            tests/test_pipeline_and_publisher.py \
            -v
